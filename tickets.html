<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alla ärenden — FR Agent</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><img src="logo.png" alt="Confetti" height="28"></a>
    <div class="nav-center">
      <div class="nav-center-title">FR Agent</div>
      <div class="nav-center-sub">Feature Request Agent</div>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Startsida</a>
      <a href="nyheter.html" class="nav-link">Nyheter</a>
      <a href="tickets.html" class="nav-link active">Alla ärenden</a>
      <a href="submit.html" class="nav-btn">+ Ny analys</a>
    </div>
  </div>
</nav>

<header class="page-header">
  <div class="page-header-inner">
    <p class="page-label">Ärendehantering</p>
    <h1 class="page-title">Alla ärenden</h1>
    <p class="page-subtitle">Samtliga identifierade feature requests, sorterade efter antal gånger efterfrågat.</p>
  </div>
</header>

<main>
  <div class="container">
    <div class="filters" id="filters">
      <button class="filter-btn active" data-status="all">Alla</button>
      <button class="filter-btn" data-status="new">Nya</button>
      <button class="filter-btn" data-status="reviewed">Granskade</button>
      <button class="filter-btn" data-status="in_progress">Pågående</button>
      <button class="filter-btn" data-status="done">Klara</button>
    </div>

    <div id="tickets-list" class="tickets-list">
      <div class="loading">Laddar ärenden…</div>
    </div>
  </div>
</main>

<script>
  let allTickets = [];
  let activeFilter = 'all';

  async function getConfig() {
    const res = await fetch('/api/config');
    return res.json();
  }

  async function loadTickets() {
    const list = document.getElementById('tickets-list');
    let cfg;
    try {
      cfg = await getConfig();
    } catch {
      list.innerHTML = '<div class="empty-state"><p>Kunde inte nå servern.</p></div>';
      return;
    }

    try {
      const res = await fetch(
        `${cfg.supabaseUrl}/rest/v1/feature_requests?select=*&order=request_count.desc`,
        { headers: { 'apikey': cfg.supabaseAnonKey, 'Authorization': `Bearer ${cfg.supabaseAnonKey}` } }
      );
      allTickets = await res.json();
      renderList();
    } catch {
      list.innerHTML = '<div class="empty-state"><p>Kunde inte ladda ärenden.</p></div>';
    }
  }

  function renderList() {
    const list = document.getElementById('tickets-list');
    const filtered = activeFilter === 'all' ? allTickets : allTickets.filter(t => t.status === activeFilter);

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state"><p>Inga ärenden i den här kategorin. <a href="submit.html">Analysera feedback →</a></p></div>';
      return;
    }

    list.innerHTML = filtered.map(renderCard).join('');

    list.querySelectorAll('.status-select').forEach(sel => {
      sel.addEventListener('change', async (e) => {
        const id = e.target.dataset.id;
        const newStatus = e.target.value;
        await updateStatus(id, newStatus, cfg);
        const ticket = allTickets.find(t => t.id === id);
        if (ticket) ticket.status = newStatus;
        renderList();
      });
    });
  }

  async function updateStatus(id, status, cfg) {
    await fetch(`${cfg.supabaseUrl}/rest/v1/feature_requests?id=eq.${id}`, {
      method: 'PATCH',
      headers: {
        'apikey': cfg.supabaseAnonKey,
        'Authorization': `Bearer ${cfg.supabaseAnonKey}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ status })
    });
  }

  // need cfg in scope for status update
  let cfg;
  (async () => {
    cfg = await getConfig().catch(() => ({}));
    loadTickets();
  })();

  function renderCard(t) {
    const date = new Date(t.created_at).toLocaleDateString('sv-SE', { day: 'numeric', month: 'long', year: 'numeric' });
    const sources = (t.sources || []).join(', ') || 'Okänd källa';
    const statusLabel = { new: 'Ny', reviewed: 'Granskad', in_progress: 'Pågående', done: 'Klar' }[t.status] || t.status;
    return `
      <article class="ticket-card">
        <div class="ticket-card-header">
          <span class="ticket-tag status-${t.status}">${statusLabel}</span>
          <span class="ticket-count">${t.request_count} ${t.request_count === 1 ? 'request' : 'requests'}</span>
        </div>
        <h2 class="ticket-title">${t.title}</h2>
        <p class="ticket-summary">${t.summary}</p>
        <div class="ticket-problem">
          <span class="ticket-problem-label">Problemet som lyfts</span>
          <p>${t.problem}</p>
        </div>
        <footer class="ticket-footer">
          <span class="ticket-source">${sources}</span>
          <div style="display:flex;align-items:center;gap:1rem;">
            <select class="status-select" data-id="${t.id}" style="background:var(--bg);border:1px solid var(--border);color:var(--text-muted);font-family:'EB Garamond',serif;font-size:0.78rem;letter-spacing:0.06em;text-transform:uppercase;padding:0.2rem 0.5rem;cursor:pointer;outline:none;">
              <option value="new" ${t.status==='new'?'selected':''}>Ny</option>
              <option value="reviewed" ${t.status==='reviewed'?'selected':''}>Granskad</option>
              <option value="in_progress" ${t.status==='in_progress'?'selected':''}>Pågående</option>
              <option value="done" ${t.status==='done'?'selected':''}>Klar</option>
            </select>
            <span class="ticket-date">${date}</span>
          </div>
        </footer>
      </article>`;
  }

  document.getElementById('filters').addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.status;
    renderList();
  });
</script>
</body>
</html>
