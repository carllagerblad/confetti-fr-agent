<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alla ärenden — FR Agent</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><img src="logo.png" alt="Confetti" height="28"></a>
    <div class="nav-center">
      <div class="nav-center-title">FR Agent</div>
      <div class="nav-center-sub">Feature Request Agent</div>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Startsida</a>
      <a href="nyheter.html" class="nav-link">Nyheter</a>
      <a href="tickets.html" class="nav-link active">Alla ärenden</a>
      <a href="submit.html" class="nav-btn">+ Ny analys</a>
    </div>
  </div>
</nav>

<header class="page-header">
  <div class="page-header-inner">
    <p class="page-label">Ärendehantering</p>
    <h1 class="page-title">Alla ärenden</h1>
    <p class="page-subtitle">Dra och släpp kort mellan kolumnerna för att ändra status.</p>
  </div>
</header>

<main>
  <div class="kanban-wrap">
    <div class="kanban-board" id="kanban-board">
      <div class="loading" style="grid-column:1/-1;padding:4rem 2rem;text-align:center;">Laddar ärenden…</div>
    </div>
  </div>
</main>

<script>
  const COLUMNS = [
    { id: 'new',         label: 'Nya' },
    { id: 'reviewed',    label: 'Granskade' },
    { id: 'in_progress', label: 'Pågående' },
    { id: 'done',        label: 'Klara' }
  ];

  let cfg, allTickets = [];

  async function getConfig() {
    const res = await fetch('/api/config');
    return res.json();
  }

  function headers() {
    return { 'apikey': cfg.supabaseAnonKey, 'Authorization': `Bearer ${cfg.supabaseAnonKey}` };
  }

  async function updateStatus(id, status) {
    await fetch(`${cfg.supabaseUrl}/rest/v1/feature_requests?id=eq.${id}`, {
      method: 'PATCH',
      headers: { ...headers(), 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ status })
    });
  }

  function renderCard(t) {
    const date = new Date(t.created_at).toLocaleDateString('sv-SE', { day: 'numeric', month: 'short' });
    const areas = (t.product_areas || []);
    return `
      <div class="kanban-card" draggable="true" data-id="${t.id}" data-status="${t.status}" onclick="location.href='ticket.html?id=${t.id}'">
        ${areas.length ? `<div class="kanban-card-tags">${areas.map(a => `<span class="area-tag">${a}</span>`).join('')}</div>` : ''}
        <p class="kanban-card-title">${t.title}</p>
        <div class="kanban-card-footer">
          <span class="kanban-card-source">${(t.sources || []).join(', ') || '—'}</span>
          <span class="kanban-card-meta">${t.request_count} req · ${date}</span>
        </div>
      </div>`;
  }

  function buildBoard() {
    const board = document.getElementById('kanban-board');
    board.innerHTML = COLUMNS.map(col => {
      const tickets = allTickets.filter(t => t.status === col.id);
      return `
        <div class="kanban-column" data-status="${col.id}">
          <div class="kanban-column-header">
            <span class="kanban-column-title">${col.label}</span>
            <span class="kanban-column-count">${tickets.length}</span>
          </div>
          <div class="kanban-cards" data-status="${col.id}">
            ${tickets.map(renderCard).join('')}
            ${tickets.length === 0 ? '<div class="kanban-empty">Inga ärenden</div>' : ''}
          </div>
        </div>`;
    }).join('');

    initDragDrop();
  }

  function initDragDrop() {
    let dragId = null;

    document.querySelectorAll('.kanban-card').forEach(card => {
      card.addEventListener('dragstart', (e) => {
        dragId = card.dataset.id;
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        document.querySelectorAll('.kanban-cards').forEach(c => c.classList.remove('drag-over'));
      });
    });

    document.querySelectorAll('.kanban-cards').forEach(col => {
      col.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        document.querySelectorAll('.kanban-cards').forEach(c => c.classList.remove('drag-over'));
        col.classList.add('drag-over');
      });
      col.addEventListener('dragleave', (e) => {
        if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over');
      });
      col.addEventListener('drop', async (e) => {
        e.preventDefault();
        col.classList.remove('drag-over');
        const newStatus = col.dataset.status;
        const ticket = allTickets.find(t => t.id === dragId);
        if (!ticket || ticket.status === newStatus) return;
        ticket.status = newStatus;
        buildBoard();
        await updateStatus(dragId, newStatus);
      });
    });
  }

  async function load() {
    try { cfg = await getConfig(); } catch {
      document.getElementById('kanban-board').innerHTML = '<div class="empty-state" style="grid-column:1/-1"><p>Kunne inte nå servern.</p></div>';
      return;
    }
    const res = await fetch(
      `${cfg.supabaseUrl}/rest/v1/feature_requests?select=*&order=created_at.desc`,
      { headers: headers() }
    );
    allTickets = await res.json();
    if (!Array.isArray(allTickets)) allTickets = [];
    buildBoard();
  }

  load();
</script>
</body>
</html>
