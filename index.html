<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Startsida — FR Agent</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><img src="logo.png" alt="Confetti" height="28"></a>
    <div class="nav-center">
      <div class="nav-center-title">FR Agent</div>
      <div class="nav-center-sub">Feature Request Agent</div>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link active">Startsida</a>
      <a href="nyheter.html" class="nav-link">Nyheter</a>
      <a href="tickets.html" class="nav-link">Alla ärenden</a>
      <a href="submit.html" class="nav-btn">+ Ny analys</a>
    </div>
  </div>
</nav>

<header class="page-header">
  <div class="page-header-inner">
    <p class="page-label">Översikt</p>
    <h1 class="page-title">Startsida</h1>
    <p class="page-subtitle">En samlad bild av feature requests från Confettis användare.</p>
  </div>
</header>

<main>
  <div class="container">
    <div class="dashboard-grid">

      <!-- Widget: Nyheter -->
      <section class="widget">
        <div class="widget-header">
          <h2 class="widget-title">Nyheter</h2>
          <a href="nyheter.html" class="widget-link">Visa alla →</a>
        </div>
        <div id="widget-news" class="widget-list">
          <div class="loading">Laddar…</div>
        </div>
      </section>

      <!-- Widget: Mest efterfrågade -->
      <section class="widget">
        <div class="widget-header">
          <h2 class="widget-title">Mest efterfrågade</h2>
          <a href="tickets.html" class="widget-link">Visa alla →</a>
        </div>
        <div id="widget-top" class="widget-list">
          <div class="loading">Laddar…</div>
        </div>
      </section>

      <!-- Widget: Senaste nya requests -->
      <section class="widget">
        <div class="widget-header">
          <h2 class="widget-title">Senaste nya</h2>
          <a href="tickets.html" class="widget-link">Visa alla →</a>
        </div>
        <div id="widget-latest" class="widget-list">
          <div class="loading">Laddar…</div>
        </div>
      </section>

    </div>
  </div>
</main>

<script>
  async function getConfig() {
    const res = await fetch('/api/config');
    return res.json();
  }

  function headers(cfg) {
    return { 'apikey': cfg.supabaseAnonKey, 'Authorization': `Bearer ${cfg.supabaseAnonKey}` };
  }

  function renderRow(t, metaType) {
    const statusLabel = { new: 'Ny', reviewed: 'Granskad', in_progress: 'Pågående', done: 'Klar' }[t.status] || t.status;
    let meta = '';
    if (metaType === 'count') {
      meta = `<span class="row-meta">${t.request_count} req</span>`;
    } else if (metaType === 'updated') {
      const d = new Date(t.updated_at).toLocaleDateString('sv-SE', { day: 'numeric', month: 'short' });
      meta = `<span class="row-meta">${d}</span>`;
    } else if (metaType === 'created') {
      const d = new Date(t.created_at).toLocaleDateString('sv-SE', { day: 'numeric', month: 'short' });
      meta = `<span class="row-meta">${d}</span>`;
    }
    return `
      <div class="widget-row">
        <span class="ticket-tag status-${t.status}">${statusLabel}</span>
        <span class="row-title">${t.title}</span>
        ${meta}
      </div>`;
  }

  async function loadAll() {
    let cfg;
    try { cfg = await getConfig(); } catch { return; }

    const base = `${cfg.supabaseUrl}/rest/v1/feature_requests`;
    const h = headers(cfg);

    const [newsRes, topRes, latestRes] = await Promise.all([
      fetch(`${base}?select=*&order=updated_at.desc&limit=5`, { headers: h }),
      fetch(`${base}?select=*&order=request_count.desc&limit=5`, { headers: h }),
      fetch(`${base}?select=*&status=eq.new&order=created_at.desc&limit=5`, { headers: h })
    ]);

    const [news, top, latest] = await Promise.all([newsRes.json(), topRes.json(), latestRes.json()]);

    const newsEl = document.getElementById('widget-news');
    const topEl = document.getElementById('widget-top');
    const latestEl = document.getElementById('widget-latest');

    newsEl.innerHTML = Array.isArray(news) && news.length
      ? news.map(t => renderRow(t, 'updated')).join('')
      : '<div class="empty-state"><p>Inget ännu.</p></div>';

    topEl.innerHTML = Array.isArray(top) && top.length
      ? top.map(t => renderRow(t, 'count')).join('')
      : '<div class="empty-state"><p>Inget ännu.</p></div>';

    latestEl.innerHTML = Array.isArray(latest) && latest.length
      ? latest.map(t => renderRow(t, 'created')).join('')
      : '<div class="empty-state"><p>Inga nya ärenden.</p></div>';
  }

  loadAll();
</script>
</body>
</html>
